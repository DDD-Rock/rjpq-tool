<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_room" data-i18n-desc="desc_room">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YzY - 房间</title>
    <meta name="description" content="YzY - 点击链接加入房间，实时协作标记罗朱跳台路径。">
    <link rel="icon" href="favicon.ico">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="YzY - 房间" />
    <meta property="og:description" content="YzY - 点击链接加入房间，实时协作标记罗朱跳台路径。" />
    <meta property="og:image" content="https://rjpq.juanwang.cc/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/i18n.js"></script>
</head>

<body class="room-body">
    <!-- 顶部信息栏 -->
    <header class="room-header">
        <div class="header-left">
            <a href="./" class="back-btn" data-i18n-title="back_title" title="返回首页">←</a>
            <div class="room-code-area">
                <span class="label" data-i18n="room_label">房间</span>
                <span class="code" id="roomCodeDisplay">------</span>
                <span class="label" data-i18n="pwd_label" style="margin-left: 8px;">密码</span>
                <span class="code" id="roomPwdDisplay" style="font-size: 13px;">------</span>
                <button class="copy-btn" onclick="copyRoomLink()" data-i18n-title="copy_title"
                    title="复制房间信息">📋</button>
            </div>
        </div>
        <div class="header-right">
            <div class="room-count" id="roomCount" data-i18n-title="room_count_title" title="房间内人数">
                <span>👤</span> <span id="countNum">0</span>
            </div>
            <div class="status-indicator disconnected" id="statusIndicator">
                <span class="dot"></span>
            </div>
        </div>
    </header>
    <!-- 路径显示（第二行） -->
    <div class="path-bar">
        <span class="label" data-i18n="my_path" style="color: #fff;">我的路径</span>
        <span class="path-value" id="pathDisplay">????? ?????</span>
    </div>

    <!-- 角色选择 + 重置 -->
    <div class="controls-bar">
        <div class="char-buttons" id="charButtons">
            <div class="char-wrap">
                <button class="char-btn" data-color="0" onclick="setColor(0)">
                    <span class="char-label">101</span>
                </button>
                <span class="char-badge" id="badge0"></span>
            </div>
            <div class="char-wrap">
                <button class="char-btn" data-color="1" onclick="setColor(1)">
                    <span class="char-label">102</span>
                </button>
                <span class="char-badge" id="badge1"></span>
            </div>
            <div class="char-wrap">
                <button class="char-btn" data-color="2" onclick="setColor(2)">
                    <span class="char-label">103</span>
                </button>
                <span class="char-badge" id="badge2"></span>
            </div>
            <div class="char-wrap">
                <button class="char-btn" data-color="3" onclick="setColor(3)">
                    <span class="char-label">104</span>
                </button>
                <span class="char-badge" id="badge3"></span>
            </div>
        </div>
        <button class="reset-btn" onclick="resetPlatforms()">
            🔄 <span data-i18n="reset">重置</span>
        </button>
    </div>

    <!-- 平台网格 -->
    <div class="grid-container" id="platforms"></div>

    <script>
        applyI18n();
        // ===== 常量 =====
        const COLORS = [
            { bg: '#ff6b6b', glow: 'rgba(255,107,107,0.5)', text: '#fff' },  // 0: 红
            { bg: '#51cf66', glow: 'rgba(81,207,102,0.5)', text: '#fff' },  // 1: 绿
            { bg: '#339af0', glow: 'rgba(51,154,240,0.5)', text: '#fff' },  // 2: 蓝
            { bg: '#cc5de8', glow: 'rgba(204,93,232,0.5)', text: '#fff' },  // 3: 紫
        ];
        const EMPTY_COLOR = 4;

        // ===== 状态 =====
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('code');
        const roomPwd = urlParams.get('pwd');

        // 缺少房间号或密码 → 跳回首页，自动填入房间号
        if (!roomCode || !/^\d{6}$/.test(roomCode) || !roomPwd) {
            const back = roomCode ? './?prefill=' + roomCode : './';
            window.location.href = back;
        }

        let roomData = Array(40).fill(EMPTY_COLOR);
        let prevData = Array(40).fill(EMPTY_COLOR);  // 用于差量更新
        let selectedColor = -1;
        let ws = null;
        let reconnectTimer = null;
        let reconnectDelay = 1000;
        document.getElementById('roomCodeDisplay').textContent = roomCode;
        document.getElementById('roomPwdDisplay').textContent = roomPwd || '---';

        // ===== 角色选择 =====
        function setColor(colorIndex) {
            selectedColor = colorIndex;
            document.querySelectorAll('.char-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.color) === colorIndex);
            });
            renderPath();
            wsSend({ type: 'selectChar', color: colorIndex });
        }

        // 更新角色选择徽章
        function updateBadges(counts) {
            for (let i = 0; i < 4; i++) {
                const badge = document.getElementById('badge' + i);
                if (badge) {
                    if (counts[i] === 0) {
                        badge.style.visibility = 'hidden';
                    } else if (counts[i] === 1 && selectedColor === i) {
                        badge.textContent = 'me';
                        badge.style.visibility = 'visible';
                    } else {
                        badge.textContent = counts[i];
                        badge.style.visibility = 'visible';
                    }
                }
            }
        }

        // ===== 初始化网格 =====
        const cells = [];
        function initGrid() {
            const container = document.getElementById('platforms');
            for (let row = 0; row < 10; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'platform-row';

                const rowNum = document.createElement('div');
                rowNum.className = 'row-num';
                rowNum.textContent = 10 - row;
                rowDiv.appendChild(rowNum);

                for (let col = 0; col < 4; col++) {
                    const index = row * 4 + col;
                    const cell = document.createElement('div');
                    cell.className = 'platform-cell';
                    cell.textContent = col + 1;
                    cell.dataset.index = index;
                    cell.addEventListener('click', () => onCellClick(index));
                    rowDiv.appendChild(cell);
                    cells[index] = cell;
                }
                container.appendChild(rowDiv);
            }
        }

        // ===== 差量更新单元格样式 =====
        function updateCells() {
            for (let i = 0; i < 40; i++) {
                const cell = cells[i];
                const val = roomData[i];
                const changed = roomData[i] !== prevData[i];

                if (changed) {
                    if (val !== EMPTY_COLOR && COLORS[val]) {
                        cell.style.backgroundColor = COLORS[val].bg;
                        cell.style.boxShadow = '0 0 12px ' + COLORS[val].glow + ', inset 0 0 8px ' + COLORS[val].glow;
                        cell.classList.add('marked');
                    } else {
                        cell.style.backgroundColor = '';
                        cell.style.boxShadow = '';
                        cell.classList.remove('marked');
                    }
                }

                // 始终刷新 dimmed 状态（切换角色时也需要）
                if (val !== EMPTY_COLOR && COLORS[val] && selectedColor !== -1 && val !== selectedColor) {
                    cell.classList.add('dimmed');
                } else {
                    cell.classList.remove('dimmed');
                }
            }
            prevData = [...roomData];
            renderPath();
        }

        // 首次加载时强制刷新所有格子
        function updateAllCells() {
            prevData = Array(40).fill(-1); // 强制所有格子标记为"已变化"
            updateCells();
        }

        // ===== 渲染路径 =====
        function renderPath() {
            const path = new Array(10).fill('?');
            for (let i = 0; i < 40; i++) {
                if (roomData[i] === selectedColor) {
                    path[Math.floor(i / 4)] = (i % 4 + 1);
                }
            }
            const reversed = path.slice().reverse();
            const display = reversed.slice(0, 5).join('') + ' ' + reversed.slice(5).join('');
            document.getElementById('pathDisplay').textContent = display;
        }

        // ===== WebSocket 通信 =====
        function getWsUrl() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            return proto + '//' + location.host;
        }

        function connectWs() {
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

            ws = new WebSocket(getWsUrl());

            ws.onopen = () => {
                setStatus(true);
                reconnectDelay = 1000;
                // 加入房间（带密码）
                ws.send(JSON.stringify({ type: 'join', code: roomCode, password: roomPwd }));
                // 重连后重新告知服务器当前角色选择
                if (selectedColor >= 0) {
                    setTimeout(() => wsSend({ type: 'selectChar', color: selectedColor }), 200);
                }
            };

            ws.onmessage = (event) => {
                let msg;
                try { msg = JSON.parse(event.data); } catch { return; }

                if (msg.type === 'sync' && Array.isArray(msg.data)) {
                    roomData = msg.data;
                    updateCells();
                } else if (msg.type === 'count') {
                    document.getElementById('countNum').textContent = msg.count;
                } else if (msg.type === 'charCounts' && Array.isArray(msg.counts)) {
                    updateBadges(msg.counts);
                } else if (msg.type === 'error') {
                    alert(msg.error);
                    if (msg.error === '密码错误' || msg.error === '房间不存在') {
                        window.location.href = './';
                    }
                }
            };

            ws.onclose = () => {
                setStatus(false);
                scheduleReconnect();
            };

            ws.onerror = () => {
                setStatus(false);
                ws.close();
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connectWs();
            }, reconnectDelay);
            // 指数退避，最大 10 秒
            reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
        }

        function wsSend(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(msg));
            }
        }

        // ===== 点击平台 =====
        let lastClickTime = 0;
        const CLICK_INTERVAL = 300;

        function onCellClick(index) {
            if (selectedColor === -1) {
                alert(t('select_char'));
                return;
            }
            const now = Date.now();
            if (now - lastClickTime < CLICK_INTERVAL) return;
            lastClickTime = now;

            // 取消自己的标记
            if (roomData[index] === selectedColor) {
                roomData[index] = EMPTY_COLOR;
                updateCells();
                wsSend({ type: 'unmark', index, color: selectedColor });
                return;
            }

            // 已被其他颜色占用
            if (roomData[index] !== EMPTY_COLOR) return;

            // 乐观更新：同行内同色互斥
            const rowStart = Math.floor(index / 4) * 4;
            for (let i = rowStart; i < rowStart + 4; i++) {
                if (i !== index && roomData[i] === selectedColor) {
                    roomData[i] = EMPTY_COLOR;
                }
            }
            roomData[index] = selectedColor;
            updateCells();

            wsSend({ type: 'mark', index, color: selectedColor });
        }

        // ===== 重置 =====
        function resetPlatforms() {
            if (!confirm(t('confirm_reset'))) return;
            roomData = Array(40).fill(EMPTY_COLOR);
            updateCells();
            wsSend({ type: 'reset' });
        }

        // ===== 复制房间链接 =====
        function copyRoomLink() {
            const text = t('copy_text', { code: roomCode, pwd: roomPwd });
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅';
                setTimeout(() => btn.textContent = '📋', 1500);
            }).catch(() => {
                const el = document.getElementById('roomCodeDisplay');
                const range = document.createRange();
                range.selectNodeContents(el);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
            });
        }

        // ===== 连接状态 =====
        function setStatus(ok) {
            const el = document.getElementById('statusIndicator');
            el.className = 'status-indicator ' + (ok ? 'connected' : 'disconnected');
        }

        // ===== 启动 =====
        initGrid();
        updateAllCells();
        connectWs();
    </script>
</body>

</html>
